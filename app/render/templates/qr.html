<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      {{ base_css | safe }}
      .content {
        flex-direction: column;
        justify-content: center;
        gap: 22px;
      }
      .qr-img {
        width: {{ qr_size }}px;
        height: {{ qr_size }}px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .caption {
        font-size: 18px;
        font-weight: 600;
        line-height: 1.3;
        color: #000000;
        word-wrap: break-word;
        overflow-wrap: anywhere;
        max-width: 344px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">QR Code</div>
      <div class="content">
        <img class="qr-img" src="{{ qr_uri }}" alt="QR code" />
        <div class="caption">{{ caption }}</div>
      </div>
      <div class="footer">
        <span>m5color-trmnl</span>
        <span>{{ footer_right }}</span>
      </div>
    </div>
  </body>
</html>
