services:
  trmnl:
    # Public image published by GitHub Actions; pulled from ghcr.io.
    image: ghcr.io/ognevoa/m5color-trmnl:latest
    # To build locally instead of pulling, comment out `image:` above and
    # uncomment the line below:
    # build: .
    container_name: m5color-trmnl
    restart: unless-stopped
    ports:
      # host:container -- the app listens on 8000 inside the container and is
      # exposed on 17555 on the host (PUBLIC_BASE_URL must use :17555).
      - "17555:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
